<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Himanen's Calculator</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <body>
            <div class="calculator">
                <div class="display-container">
                    <input id="displayTotal" type="text" readonly placeholder="0" />
                    <input id="display" type="text" inputmode="numeric" placeholder="0" />
                </div>

                <div class="calculator-grid">
                    <button id="btn_CLEAR" class="btn-special" onclick="clearDisplay()">AC</button>
                    <button onclick="showOnDisplay('%')">%</button>
                    <button onclick="backspace()">DEL</button>
                    <button class="btn-op" onclick="showOnDisplay('/')">/</button>

                    <button onclick="showOnDisplay('7')">7</button>
                    <button onclick="showOnDisplay('8')">8</button>
                    <button onclick="showOnDisplay('9')">9</button>
                    <button class="btn-op" id="btn_X" onclick="showOnDisplay('*')">×</button>

                    <button onclick="showOnDisplay('4')">4</button>
                    <button onclick="showOnDisplay('5')">5</button>
                    <button onclick="showOnDisplay('6')">6</button>
                    <button class="btn-op" id="btn_-" onclick="showOnDisplay('-')">-</button>

                    <button onclick="showOnDisplay('1')">1</button>
                    <button onclick="showOnDisplay('2')">2</button>
                    <button onclick="showOnDisplay('3')">3</button>
                    <button class="btn-op" id="btn_+" onclick="showOnDisplay('+')">+</button>

                    <button id="btn_0" class="span-two" onclick="showOnDisplay('0')">0</button>
                    <button id="btn_." onclick="showOnDisplay('.')">.</button>
                    <button id="btn_equal" class="btn-op" onclick="calculate()">=</button>
                </div>
            </div>

            <script src="calculator1.js"></script>
        </body>
    </body>
</html>
